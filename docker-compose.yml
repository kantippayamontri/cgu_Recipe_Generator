services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "2222:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:2222/api/v1}
    ports:
      - "2223:3000"
    restart: unless-stopped
